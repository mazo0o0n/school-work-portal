<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل المدرسة</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
<main class="register-page">
  <section class="form-panel">
    <div class="form-shell">
      <div class="brand">
        <img class="brand-logo" src="assets/images/site-logo-mark.webp" width="460" height="345" alt="منصة التنظيم المدرسي والموارد التعليمية" decoding="async">
      </div>
      <h1 class="welcome">مرحبًا بك</h1>
      <form class="register-form" id="schoolRegisterForm">
        <div class="registration-fields">
          <div class="field">
            <label for="schoolName">اسم المدرسة</label>
            <input id="schoolName" name="schoolName" type="text" placeholder="مثال: مازن" autocomplete="organization" inputmode="text" required>
            <p class="field-error" id="schoolNameError" aria-live="polite"></p>
          </div>
          <div class="field">
            <label for="schoolStage">المرحلة</label>
            <select id="schoolStage" name="schoolStage" required>
              <option value="" selected disabled>اختر المرحلة</option>
              <option value="ابتدائية">ابتدائي</option>
              <option value="متوسطة">متوسطة</option>
              <option value="ثانوية">ثانوي</option>
            </select>
          </div>
          <div class="field">
            <label for="educationDepartment">إدارة التعليم</label>
            <input id="educationDepartment" name="educationDepartment" type="text" placeholder="مثال: إدارة تعليم الرياض">
          </div>
          <div class="field">
            <label for="ministryNumber">الرقم الوزاري للمدرسة</label>
            <input id="ministryNumber" name="ministryNumber" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="أدخل الرقم الوزاري" autocomplete="off">
          </div>
          <div class="field">
            <label for="principalName">اسم مدير المدرسة</label>
            <input id="principalName" name="principalName" type="text" placeholder="أدخل اسم مدير المدرسة">
          </div>
          <div class="field">
            <label for="educationalAffairsAgent">اسم وكيل الشؤون التعليمية</label>
            <input id="educationalAffairsAgent" name="educationalAffairsAgent" type="text" placeholder="أدخل اسم وكيل الشؤون التعليمية">
          </div>
          <div class="field">
            <label for="studentAffairsAgent">اسم وكيل شؤون الطلاب</label>
            <input id="studentAffairsAgent" name="studentAffairsAgent" type="text" placeholder="أدخل اسم وكيل شؤون الطلاب">
          </div>
          <div class="field">
            <label for="schoolAffairsAgent">اسم وكيل الشؤون المدرسية</label>
            <input id="schoolAffairsAgent" name="schoolAffairsAgent" type="text" placeholder="أدخل اسم وكيل الشؤون المدرسية">
          </div>
        </div>
        <div class="preview" aria-label="معاينة الهيدر">
          <img src="assets/images/school-header-base.png" alt="">
          <div class="preview-name" id="schoolPreview">سيظهر الاسم في الهيدر هنا</div>
        </div>
        <div class="actions">
          <button type="submit">حفظ وعرض الصفحة</button>
          <button class="guest-btn" id="guestEntry" type="button">الدخول كزائر</button>
        </div>
      </form>
      <p class="subscription-note">تنبيه: التقارير ستكون باشتراك وليست مجانية.</p>
      <p class="hint">سيتم حفظ البيانات محليًا على هذا المتصفح، وسيظهر الاسم في الهيدر بصيغة: المرحلة + اسم المدرسة.</p>
    </div>
  </section>

  <section class="visual-panel" aria-label="صورة المدرسة">
    <span class="corner top" aria-hidden="true"></span>
    <span class="corner bottom" aria-hidden="true"></span>
  </section>
</main>
<script src="assets/js/register.js"></script>
</body>
</html>
