<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل المدرسة</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
<main class="register-page">
  <section class="form-panel">
    <div class="form-shell">
      <div class="brand">
        <img class="brand-logo" src="assets/images/site-logo-mark.webp" width="460" height="345" alt="منصة التنظيم المدرسي والموارد التعليمية" decoding="async">
      </div>
      <h1 class="welcome">مرحبًا بك</h1>
      <form class="register-form" id="schoolRegisterForm">
        <div class="registration-fields">
          <div class="field">
            <label for="schoolName">اسم المدرسة</label>
            <input id="schoolName" name="schoolName" type="text" placeholder="مثال: مازن" autocomplete="organization" inputmode="text" required>
            <p class="field-error" id="schoolNameError" aria-live="polite"></p>
          </div>
          <div class="field">
            <label for="schoolStage">المرحلة</label>
            <select id="schoolStage" name="schoolStage" required>
              <option value="" selected disabled>اختر المرحلة</option>
              <option value="ابتدائية">ابتدائي</option>
              <option value="متوسطة">متوسطة</option>
              <option value="ثانوية">ثانوي</option>
            </select>
          </div>
          <div class="field">
            <label for="educationDepartment">إدارة التعليم</label>
            <select id="educationDepartment" name="educationDepartment" required>
              <option value="" selected disabled>اختر إدارة التعليم</option>
              <option value="إدارة التعليم بمنطقة الرياض">إدارة التعليم بمنطقة الرياض</option>
              <option value="إدارة التعليم بمنطقة مكة المكرمة">إدارة التعليم بمنطقة مكة المكرمة</option>
              <option value="إدارة التعليم بمنطقة المدينة المنورة">إدارة التعليم بمنطقة المدينة المنورة</option>
              <option value="إدارة التعليم بمنطقة القصيم">إدارة التعليم بمنطقة القصيم</option>
              <option value="إدارة التعليم بالمنطقة الشرقية">إدارة التعليم بالمنطقة الشرقية</option>
              <option value="إدارة التعليم بمنطقة عسير">إدارة التعليم بمنطقة عسير</option>
              <option value="إدارة التعليم بمنطقة تبوك">إدارة التعليم بمنطقة تبوك</option>
              <option value="إدارة التعليم بمنطقة حائل">إدارة التعليم بمنطقة حائل</option>
              <option value="إدارة التعليم بمنطقة الحدود الشمالية">إدارة التعليم بمنطقة الحدود الشمالية</option>
              <option value="إدارة التعليم بمنطقة جازان">إدارة التعليم بمنطقة جازان</option>
              <option value="إدارة التعليم بمنطقة نجران">إدارة التعليم بمنطقة نجران</option>
              <option value="إدارة التعليم بمنطقة الباحة">إدارة التعليم بمنطقة الباحة</option>
              <option value="إدارة التعليم بمنطقة الجوف">إدارة التعليم بمنطقة الجوف</option>
              <option value="إدارة التعليم بمحافظة جدة">إدارة التعليم بمحافظة جدة</option>
              <option value="إدارة التعليم بمحافظة الطائف">إدارة التعليم بمحافظة الطائف</option>
              <option value="إدارة التعليم بمحافظة الأحساء">إدارة التعليم بمحافظة الأحساء</option>
            </select>
          </div>
        </div>
        <div class="preview" aria-label="معاينة الهيدر">
          <img src="assets/images/school-header-base.png" alt="">
          <div class="preview-name" id="schoolPreview">سيظهر الاسم في الهيدر هنا</div>
        </div>
        <div class="actions">
          <button type="submit">حفظ وعرض الصفحة</button>
          <button class="guest-btn" id="guestEntry" type="button">الدخول كزائر</button>
        </div>
      </form>
      <p class="subscription-note">تنبيه: التقارير ستكون باشتراك وليست مجانية.</p>
      <p class="hint">سيتم استخدام هذه البيانات لتخصيص واجهة المنصة والتقارير، ويمكن تعديلها لاحقًا.</p>
    </div>
  </section>

  <section class="visual-panel" aria-label="صورة المدرسة">
    <span class="corner top" aria-hidden="true"></span>
    <span class="corner bottom" aria-hidden="true"></span>
  </section>
</main>
<script src="assets/js/register.js"></script>
</body>
</html>
