<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>اختبار أسئلة مساعد المنصة</title>
  <link rel="stylesheet" href="assets/css/assistant-test.css">
</head>
<body>
  <main class="test-page">
    <header class="test-header">
      <div>
        <p class="eyebrow">صفحة داخلية للمطور</p>
        <h1>اختبار أسئلة مساعد المنصة</h1>
        <p>قائمة اختبار يدوية مستقلة؛ لا تستدعي المساعد ولا ترسل نتائج إلى backend.</p>
      </div>
      <div class="header-actions">
        <button type="button" id="copyAllQuestions">نسخ كل الأسئلة</button>
        <button type="button" id="copyReport">نسخ تقرير الاختبار</button>
        <button type="button" id="clearResults" class="danger-button">مسح النتائج</button>
      </div>
    </header>

    <section class="summary" aria-label="ملخص نتائج الاختبار">
      <article><strong id="totalCount">0</strong><span>عدد الأسئلة</span></article>
      <article><strong id="untestedCount">0</strong><span>لم يختبر</span></article>
      <article><strong id="passedCount">0</strong><span>ناجح</span></article>
      <article><strong id="failedCount">0</strong><span>فاشل</span></article>
      <article><strong id="reviewCount">0</strong><span>يحتاج مراجعة</span></article>
    </section>

    <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>التصنيف</th>
            <th>السؤال</th>
            <th>المتوقع</th>
            <th>المصدر المتوقع</th>
            <th>الحالة اليدوية</th>
            <th>ملاحظات</th>
          </tr>
        </thead>
        <tbody id="questionsTableBody"></tbody>
      </table>
    </div>
  </main>
  <script src="assets/js/assistant-test.js"></script>
</body>
</html>
